apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    notified.notifications.argoproj.io: '{"on-deployed:[0].zxM90Et6k4Elb1-fHdjtDJq0xR0:lifecycle:":1768555891}'
  name: maestro-host-app-dev-cluster
  namespace: argocd
spec:
  destination:
    namespace: cmp
    server: https://pd-dev-304-cmp.k8s-api:16443
  project: 304-cmp-dev
  source:
    kustomize:
      nameSuffix: -admin
      patches:
      - patch: |
          - op: replace
            path: /data/BASE_URL
            value: dev.admin.okestro.cloud
          - op: replace
            path: /data/VUE_APP_KEYCLOAK_LOGOUT_URL
            value: https://dev.admin.okestro.cloud/auth/realms/maestro-admin/protocol/openid-connect/logout
        target:
          kind: ConfigMap
          name: host-app-env
    path: 2-products/2.1-maestro/maestro-host-app/overlays/admin/oce/dev
    repoURL: https://bitbucket.org/okestrolab/maestro-packaging.git
    targetRevision: HEAD
  syncPolicy: {}
