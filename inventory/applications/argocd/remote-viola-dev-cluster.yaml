apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    notified.notifications.argoproj.io: '{"on-deployed:[0].zxM90Et6k4Elb1-fHdjtDJq0xR0:lifecycle:":1768555906}'
  name: remote-viola-dev-cluster
  namespace: argocd
spec:
  destination:
    namespace: viola
    server: https://pd-dev-304-cmp.k8s-api:16443
  project: 304-cmp-dev
  source:
    kustomize:
      nameSuffix: -admin
      patches:
      - patch: |
          - op: replace
            path: /data/BASE_URL
            value: https://dev.admin.okestro.cloud
          - op: replace
            path: /data/VUE_APP_OPENSHFIT_WEBSOCKET_API_URL
            value: wss://dev.admin.okestro.cloud/v1/viola/admin
          - op: replace
            path: /data/VUE_APP_CMP_ENDPOINT
            value: https://dev.admin.okestro.cloud/v1/maestro
        target:
          kind: ConfigMap
          name: viola-app-env
    path: 2-products/2.3-viola/viola-remote-app/overlays/admin/oce/dev
    repoURL: https://bitbucket.org/okestrolab/maestro-packaging.git
    targetRevision: HEAD
  syncPolicy: {}
